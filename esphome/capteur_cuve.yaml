# =============================================================================
# ESPHome — Jauge de cuve à eau
# Matériel : ESP32 + JSN-SR04T/AJ-SR04M + level shifter 3.3V↔5V
# =============================================================================
#
# ⚙️ PARAMÈTRES D'ÉTALONNAGE (À ADAPTER APRÈS MESURES PHASE 1)
#
#   Ces valeurs DOIVENT être mesurées sur site avec le script MicroPython
#   (test_cuve.py) avant de déployer cette configuration en production.
#
#   DIST_VIDE_M   : Distance capteur → surface de l'eau quand cuve VIDE
#                   = Hauteur de montage du capteur au-dessus du fond
#                   ⚠️ Valeur par défaut ci-dessous : 1.40 m (À REMPLACER)
#
#   DIST_PLEIN_M  : Distance capteur → surface de l'eau quand cuve PLEINE
#                   = Hauteur capteur - hauteur d'eau maximale
#                   ⚠️ Contrainte zone aveugle JSN-SR04T/AJ-SR04M : ~20-25 cm
#                   Le capteur ne peut PAS mesurer en dessous de 20 cm.
#                   ⚠️ Valeur par défaut ci-dessous : 0.20 m (À REMPLACER)
#
#   VOLUME_MAX_L  : Volume réel utilisable de la cuve (litres)
#                   = Volume fourni par l'utilisateur ou mesuré physiquement
#                   Pour cuve rectangulaire 3000 L : 3000
#
# 📐 FORMULES DE CALCUL
#   niveau (%) = (DIST_VIDE_M - distance_mesurée) / (DIST_VIDE_M - DIST_PLEIN_M) × 100
#   volume (L) = niveau% / 100 × VOLUME_MAX_L
#
# =============================================================================

substitutions:
  # --- Identification du nœud ---
  node_name: capteur-cuve
  friendly_name: "Capteur Cuve à Eau"
  
  # --- ⚠️ PARAMÈTRES À CALIBRER (REMPLACER PAR VOS VALEURS RÉELLES) ---
  # Mesurez ces distances avec test_cuve.py (Phase 1) avant déploiement !
  DIST_VIDE_M:    "1.40"    # [m] Distance capteur→surface, cuve VIDE (⚠️ REMPLACER)
  DIST_PLEIN_M:   "0.20"    # [m] Distance capteur→surface, cuve PLEINE (⚠️ REMPLACER)
                             # ⚠️ Minimum absolu : 0.20 m (zone aveugle capteur)
  VOLUME_MAX_L:   "3000"    # [L] Volume réel de la cuve
  SEUIL_ALERTE_L: "300"     # [L] Seuil alerte bas niveau (10% de 3000 L)
  
  # --- Pins GPIO ESP32 (level shifter côté LV → ESP32 3.3V) ---
  # GPIO23/GPIO22 : validés en Phase 1 MicroPython
  # Ces GPIO sont libres sur ESP32-WROOM-32 standard et ESP32-WROVER
  # ⚠️ Si vous avez câblé différemment, adaptez ces valeurs
  PIN_TRIG: GPIO23
  PIN_ECHO: GPIO22

# =============================================================================
# Configuration ESPHome
# =============================================================================

esphome:
  name: ${node_name}
  friendly_name: ${friendly_name}

esp32:
  board: esp32dev
  framework:
    type: arduino

# -----------------------------------------------------------------------------
# Connectivité
# -----------------------------------------------------------------------------

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  
  # Point d'accès de secours si WiFi principal inaccessible
  ap:
    ssid: "${friendly_name} Fallback"
    password: !secret ap_password

captive_portal:

logger:
  level: INFO

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

# -----------------------------------------------------------------------------
# Capteur ultrason JSN-SR04T / AJ-SR04M
# -----------------------------------------------------------------------------

sensor:
  # ---- 1. Distance brute (m) ----
  # Filtre médiane pour éliminer les faux échos
  - platform: ultrasonic
    trigger_pin: ${PIN_TRIG}
    echo_pin: ${PIN_ECHO}
    name: "Distance Brute"
    id: distance_brute
    unit_of_measurement: "m"
    icon: mdi:ruler
    device_class: distance
    state_class: measurement
    accuracy_decimals: 3
    update_interval: 5s
    pulse_time: 10us
    timeout: 2m              # Distance max détection (2 m couvre plage utile)
    filters:
      # Filtre médiane : prend 7 mesures, retourne la valeur centrale
      # Élimine les faux échos (valeurs aberrantes)
      - median:
          window_size: 7
          send_every: 1      # Publie à chaque nouvelle médiane
          send_first_at: 1
      # Clamp : rejette les valeurs hors plage physique capteur (zone aveugle <20 cm, hors portée >4 m)
      # ignore_out_of_range: true permet de laisser passer NAN sans bloquer le pipeline
      # DOIT être placé AVANT timeout pour que les mesures invalides ne réinitialisent pas le compteur
      - clamp:
          min_value: 0.20
          max_value: 4.00
          ignore_out_of_range: true
      # Timeout : marque comme unavailable si aucune mesure valide pendant 60s
      # Placé APRÈS clamp pour détecter correctement les pannes capteur
      # (mesures hors plage continues ou absence de mesure → unavailable après 60s)
      - timeout:
          timeout: 60s
          value: !lambda "return NAN;"

  # ---- 2. Niveau d'eau (%) ----
  - platform: template
    name: "Niveau Eau"
    id: niveau_eau
    unit_of_measurement: "%"
    icon: mdi:water-percent
    state_class: measurement
    accuracy_decimals: 1
    update_interval: 5s
    lambda: |-
      float dist_vide  = ${DIST_VIDE_M};
      float dist_plein = ${DIST_PLEIN_M};
      float dist       = id(distance_brute).state;
      
      // Propage l'indisponibilité : si distance_brute est unavailable, niveau_eau aussi
      if (isnan(dist)) return NAN;
      
      // Calcul niveau : 0% = vide (dist_vide), 100% = plein (dist_plein)
      float niveau = (dist_vide - dist) / (dist_vide - dist_plein) * 100.0f;
      
      // Clamping 0-100%
      if (niveau < 0.0f)   niveau = 0.0f;
      if (niveau > 100.0f) niveau = 100.0f;
      
      return niveau;

  # ---- 3. Volume d'eau (litres) ----
  - platform: template
    name: "Volume Eau"
    id: volume_eau
    unit_of_measurement: "L"
    icon: mdi:water
    device_class: volume_storage
    state_class: measurement
    accuracy_decimals: 0
    update_interval: 5s
    lambda: |-
      float niv = id(niveau_eau).state;
      // Propage l'indisponibilité : si niveau_eau est unavailable, volume_eau aussi
      if (isnan(niv)) return NAN;
      return niv / 100.0f * ${VOLUME_MAX_L};

# -----------------------------------------------------------------------------
# Alerte bas niveau
# -----------------------------------------------------------------------------

binary_sensor:
  - platform: template
    name: "Alerte Bas Niveau"
    id: alerte_bas_niveau
    device_class: problem
    icon: mdi:water-alert
    lambda: |-
      float vol = id(volume_eau).state;
      if (isnan(vol)) return false;
      return vol < ${SEUIL_ALERTE_L};
    filters:
      # Anti-chattering : attend 30s de condition vraie avant déclenchement
      - delayed_on: 30s
